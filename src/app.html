<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#1e0d38" />

		<!-- Default SEO (overridden per page via svelte:head) -->
		<title>Phil's Jeopardy</title>
		<meta name="description" content="Das interaktive Jeopardy-Spiel für Zuhause. Erstelle eigene Runden, spiele mit Freunden und tritt in Teams an." />
		<meta name="robots" content="index, follow" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Phil's Jeopardy" />
		<meta property="og:title" content="Phil's Jeopardy" />
		<meta property="og:description" content="Das interaktive Jeopardy-Spiel für Zuhause. Erstelle eigene Runden, spiele mit Freunden und tritt in Teams an." />
		<meta property="og:locale" content="de_DE" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Phil's Jeopardy" />
		<meta name="twitter:description" content="Das interaktive Jeopardy-Spiel für Zuhause." />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
