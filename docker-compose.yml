services:

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3000"
      ORIGIN: "${ORIGIN}"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: phils_jeopardy
      POSTGRES_USER: jeopardy
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeopardy -d phils_jeopardy"]
      interval: 5s
      timeout: 5s
      retries: 10


volumes:
  postgres_data:
